<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DM DOUBLE M | Secure Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #2a2a2a; }
        body { background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; text-align: center; margin: 0; }
        
        .lock { padding: 100px 20px; }
        input { padding: 15px; border-radius: 10px; border: 1px solid #444; width: 250px; font-size: 1.2rem; text-align: center; background: #111; color: white; }
        .unlock-btn { background: var(--gold); padding: 15px 40px; border-radius: 10px; font-weight: bold; border: none; margin-top: 20px; cursor: pointer; color: black; text-transform: uppercase; }

        #celebration { display: none; padding: 40px 20px; }

        .player-container { 
            position: relative; 
            max-width: 750px; 
            margin: 20px auto; 
            border: 2px solid var(--gold); 
            border-radius: 15px; 
            overflow: hidden; 
            background: #000; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }
        
        /* The Shield starts INVISIBLE and OFF */
        .total-shield { 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 10; 
            background: rgba(0,0,0,0); 
            display: none; 
        }

        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; z-index: 1; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .security-note { color: #ff4444; font-size: 0.7rem; font-weight: bold; margin: 15px 0; text-transform: uppercase; }
        .play-instruction { color: var(--gold); font-size: 0.9rem; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="lockScreen" class="lock">
        <h1 style="color:var(--gold);">DM DOUBLE M | SECURE</h1>
        <input type="password" id="pw" placeholder="Enter Password">
        <br>
        <button class="unlock-btn" onclick="openRoom()">UNLOCK ROOM</button>
    </div>

    <div id="celebration">
        <div class="security-note">PRIVATE PREVIEW: SHARING PROHIBITED</div>
        
        <div class="player-container" id="playerParent">
            <div class="total-shield" id="totalShield" onclick="togglePlay()"></div>

            <div class="video-wrapper">
                <iframe id="yt-player" src="https://www.youtube.com/embed/08ChAGrMKhg?enablejsapi=1&rel=0&modestbranding=1&controls=1&disablekb=1" allowfullscreen></iframe>
            </div>
        </div>

        <p id="instruction" class="play-instruction">Press Play to start exclusive content</p>
        <p style="font-size: 0.8rem; color: #888;">&copy; 2026 DM Double M Music</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        function openRoom() {
            var pass = document.getElementById("pw").value.toLowerCase();
            if(pass === "healing2026") {
                document.getElementById("lockScreen").style.display = "none";
                document.getElementById("celebration").style.display = "block";
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#d4af37', '#ffffff'] });
                
                // Listen for the first click on the video area
                document.getElementById("playerParent").addEventListener("click", activateSecurity, {once: true});
            } else { 
                alert("Access Denied"); 
            }
        }

        function activateSecurity() {
            // Once they click play, we turn on the invisible shield
            document.getElementById("totalShield").style.display = "block";
            document.getElementById("instruction").innerHTML = "Security Active: Tap to Play/Pause";
            isPlaying = true;
        }

        var isPlaying = false;
        function togglePlay() {
            var iframe = document.getElementById('yt-player');
            if (!isPlaying) {
                iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
                isPlaying = true;
            } else {
                iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
                isPlaying = false;
            }
        }

        // Block View Source keys
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && (e.key === 'u' || e.key === 's' || e.key === 'i')) { e.preventDefault(); }
        });
    </script>
</body>
</html>
