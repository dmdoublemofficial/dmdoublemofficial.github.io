<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DM DOUBLE M | Watch Room</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; margin: 0; overflow-x: hidden; }
        .lock { padding: 100px 20px; }
        input { padding: 15px; border-radius: 10px; border: none; width: 250px; font-size: 1.2rem; text-align: center; }
        .btn { background: #d4af37; padding: 15px 40px; border-radius: 10px; font-weight: bold; border: none; margin-top: 20px; cursor: pointer; }
        #celebration { display: none; padding: 40px 20px; position: relative; z-index: 10; }
        
        /* Confetti Canvas */
        #canvas { position: fixed; top: 0; left: 0; pointer-events: none; width: 100%; height: 100%; z-index: 5; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="lockScreen" class="lock">
        <h1 style="color:#d4af37;">ENTER PASSWORD</h1>
        <input type="password" id="pw" placeholder="Code here">
        <br>
        <button class="btn" onclick="openRoom()">UNLOCK</button>
    </div>

    <div id="celebration">
        <h1 style="color:#d4af37; font-size: 2.5rem;">CONGRATULATIONS!</h1>
        <p style="font-size: 1.2rem; margin-bottom: 40px;">Respect for the 200 FRW. This helps me keep the music coming. Enjoy the exclusives. <br><br><b>Manasse</b></p>
        
        <div style="background:#1a1a1a; padding:30px; border-radius: 20px; border: 1px solid #333;">
            <h3 style="color:#d4af37;">EXCLUSIVE MUSIC (AUDIO/VIDEO)</h3>
            <p style="color:#666;">Players loading...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        function openRoom() {
            if(document.getElementById("pw").value === "healing2026") {
                document.getElementById("lockScreen").style.display = "none";
                document.getElementById("celebration").style.display = "block";
                // Start Confetti Celebration
                var duration = 5 * 1000;
                var animationEnd = Date.now() + duration;
                var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };
                function randomInRange(min, max) { return Math.random() * (max - min) + min; }
                var interval = setInterval(function() {
                    var timeLeft = animationEnd - Date.now();
                    if (timeLeft <= 0) { return clearInterval(interval); }
                    var particleCount = 50 * (timeLeft / duration);
                    confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                    confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
                }, 250);
            } else { alert("Wrong Code"); }
        }
    </script>
</body>
</html>
