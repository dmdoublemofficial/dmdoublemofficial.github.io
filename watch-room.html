<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DM DOUBLE M | Secure Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #2a2a2a; }
        body { background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; text-align: center; margin: 0; user-select: none; -webkit-user-select: none; }
        
        .lock { padding: 100px 20px; }
        input { padding: 15px; border-radius: 10px; border: 1px solid #444; width: 250px; font-size: 1.2rem; text-align: center; background: #111; color: white; }
        .unlock-btn { background: var(--gold); padding: 15px 40px; border-radius: 10px; font-weight: bold; border: none; margin-top: 20px; cursor: pointer; color: black; }

        #celebration { display: none; padding: 40px 20px; }

        /* THE SECURITY SHIELD */
        .player-container { position: relative; max-width: 750px; margin: 20px auto; border: 2px solid var(--gold); border-radius: 15px; overflow: hidden; background: #000; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        
        /* This transparent layer blocks clicks to the YouTube "Share" and "Watch Later" icons */
        .shield { position: absolute; top: 0; left: 0; width: 100%; height: 50px; z-index: 10; background: transparent; }
        .shield-bottom { position: absolute; bottom: 0; left: 0; width: 100%; height: 50px; z-index: 10; background: transparent; }
        .shield-right { position: absolute; top: 0; right: 0; width: 80px; height: 100%; z-index: 10; background: transparent; }

        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; z-index: 1; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .watermark { color: #ff4444; font-size: 0.7rem; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; border: 1px dashed #ff4444; padding: 5px; display: inline-block; }
    </style>
</head>
<body oncontextmenu="return false;"> <div id="lockScreen" class="lock">
        <h1 style="color:var(--gold);">SECURE ACCESS</h1>
        <input type="password" id="pw" placeholder="Enter Code">
        <br>
        <button class="unlock-btn" onclick="openRoom()">UNLOCK</button>
    </div>

    <div id="celebration">
        <p style="font-size: 1rem; color: #ccc;">Exclusive Preview for Supporters<br><strong>Manasse</strong></p>
        
        <div class="player-container">
            <div class="shield"></div>
            <div class="shield-bottom"></div>
            <div class="shield-right"></div>

            <div class="video-wrapper">
                <iframe id="yt-player" src="https://www.youtube.com/embed/08ChAGrMKhg" allowfullscreen></iframe>
            </div>
        </div>

        <div class="watermark">Restricted Content - Property of DM Double M</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        function openRoom() {
            if(document.getElementById("pw").value.toLowerCase() === "healing2026") {
                document.getElementById("lockScreen").style.display = "none";
                document.getElementById("celebration").style.display = "block";
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#d4af37', '#ffffff'] });
            } else { alert("Access Denied"); }
        }

        // Block Keyboard Shortcuts for Saving/Copying
        document.onkeydown = function(e) {
            if (e.ctrlKey && (e.keyCode === 67 || e.keyCode === 85 || e.keyCode === 83 || e.keyCode === 123)) {
                return false;
            }
        };
    </script>
</body>
</html>
