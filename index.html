<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DM DOUBLE M | Watch Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #1a1a1a; --card: #252525; }
        body { background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; text-align: center; margin: 0; overflow-x: hidden; }
        
        /* Lock Screen */
        .lock { padding: 100px 20px; transition: 0.5s; }
        input { padding: 15px; border-radius: 10px; border: 1px solid #444; width: 250px; font-size: 1.2rem; text-align: center; background: #111; color: white; }
        .unlock-btn { background: var(--gold); padding: 15px 40px; border-radius: 10px; font-weight: bold; border: none; margin-top: 20px; cursor: pointer; color: black; }

        /* The Content Area */
        #celebration { display: none; padding: 40px 20px; position: relative; z-index: 10; animation: fadeIn 1s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .player-box { background: var(--card); max-width: 700px; margin: 30px auto; padding: 20px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 10px; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        #canvas { position: fixed; top: 0; left: 0; pointer-events: none; width: 100%; height: 100%; z-index: 5; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="lockScreen" class="lock">
        <h1 style="color:var(--gold); letter-spacing: 2px;">ENTER WATCH ROOM</h1>
        <p style="color:#888; margin-bottom: 30px;">Input your unique 48-hour password</p>
        <input type="password" id="pw" placeholder="••••••••">
        <br>
        <button class="unlock-btn" onclick="openRoom()">UNLOCK NOW</button>
    </div>

    <div id="celebration">
        <h1 style="color:var(--gold); font-size: 2.2rem; margin:0;">CONGRATULATIONS!</h1>
        <p style="font-size: 1.1rem; margin: 20px 0 40px; line-height: 1.6; color: #ccc;">
            Respect for the 200 FRW. This helps me keep the music coming. <br>Enjoy the exclusives. <br><br>
            <strong>Manasse</strong>
        </p>
        
        <div class="player-box">
            <h3 style="color:var(--gold); margin-top:0; letter-spacing: 1px;">EXCLUSIVE VIDEO: MY FUTURE</h3>
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/S016hI77w-8?autoplay=0&rel=0" allowfullscreen></iframe>
            </div>
        </div>

        <div class="player-box" style="padding: 10px;">
            <p style="color:#666; font-size: 0.8rem; margin: 10px 0;">Audio Demo coming soon...</p>
        </div>

        <p style="margin-top: 50px;"><a href="index.html" style="color:var(--gold); text-decoration: none; font-size: 0.8rem;">← Back to Main Site</a></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        function openRoom() {
            var code = document.getElementById("pw").value;
            if(code.toLowerCase() === "healing2026") {
                document.getElementById("lockScreen").style.display = "none";
                document.getElementById("celebration").style.display = "block";
                
                // Celebration Confetti
                var duration = 4 * 1000;
                var end = Date.now() + duration;
                (function frame() {
                    confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#d4af37', '#ffffff'] });
                    confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#d4af37', '#ffffff'] });
                    if (Date.now() < end) { requestAnimationFrame(frame); }
                }());
            } else { alert("Incorrect Password"); }
        }
    </script>
</body>
</html>
